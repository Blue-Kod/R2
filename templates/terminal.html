<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 - Терминал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            color: #00ff00;
            font-family: 'Ubuntu Sans Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #111;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        header a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            margin: 0 15px;
        }
        header a:hover {
            text-decoration: underline;
        }
        #output {
            flex: 1;
            background: black;
            color: #00ff00;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Ubuntu Sans Mono', monospace;
        }
        .input-line {
            display: flex;
            background: #111;
            border-top: 1px solid #333;
            padding: 10px;
        }
        .prompt {
            color: #00ff00;
            font-size: 16px;
            margin-right: 8px;
            user-select: none;
        }
        #command {
            flex: 1;
            background: black;
            border: none;
            outline: none;
            color: #00ff00;
            font-family: 'Ubuntu Sans Mono', monospace;
            font-size: 16px;
            caret-color: #00ff00;
        }
        #command::placeholder {
            color: #006600;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">R2</a>
        <a href="/screen">Экран</a>
        <a href="/terminal">CMD</a>
        <a href="/logs">Логи</a>
    </header>
    <div id="output"></div>
    <div class="input-line">
        <span class="prompt">$</span>
        <input type="text" id="command" placeholder="Введите команду..." autofocus>
    </div>

    <script>
        const outputDiv = document.getElementById('output');
        const commandInput = document.getElementById('command');
        let lastOutput = '';
        let pollInterval = 200; // миллисекунд
        let fetchInProgress = false;
        let sendInProgress = false;

        // Удаление ANSI-последовательностей и нормализация переводов строк
        function stripAnsi(str) {
            if (!str) return '';
            // Удаляем CSI: \x1b\[[0-9;?]*[a-zA-Z]
            // Удаляем OSC: \x1b\][0-9;]*[a-zA-Z]?.*?\x07
            // Удаляем ST: \x1b\\
            // Удаляем BEL: \x07
            let cleaned = str
                .replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '')
                .replace(/\x1b\][0-9;]*[a-zA-Z]?.*?\x07/g, '')
                .replace(/\x1b\\/g, '')
                .replace(/\x07/g, '');
            // Нормализуем переводы строк: заменяем \r\n на \n, одиночные \r на \n
            cleaned = cleaned.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            return cleaned;
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function setOutput(text) {
            outputDiv.innerHTML = escapeHtml(stripAnsi(text));
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        // Функция запроса вывода с повторными попытками при ошибке
        async function fetchOutput(retries = 5) {
            if (fetchInProgress) return;
            fetchInProgress = true;
            try {
                const response = await fetch('/api/cmd/output');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.output !== lastOutput) {
                    setOutput(data.output);
                    lastOutput = data.output;
                }
            } catch (err) {
                console.debug('fetchOutput error:', err);
                if (retries > 0) {
                    setTimeout(() => fetchOutput(retries - 1), 500);
                }
            } finally {
                fetchInProgress = false;
            }
        }

        // Отправка команды с повторными попытками
        async function sendCommand(cmd, retries = 3) {
            if (sendInProgress) return;
            sendInProgress = true;
            try {
                const response = await fetch('/api/cmd/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.error) {
                    console.debug('sendCommand error:', data.error);
                } else {
                    // После успешной отправки сразу обновляем вывод
                    await fetchOutput();
                }
            } catch (err) {
                console.debug('sendCommand fetch error:', err);
                if (retries > 0) {
                    setTimeout(() => sendCommand(cmd, retries - 1), 500);
                }
            } finally {
                sendInProgress = false;
            }
        }

        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = commandInput.value;
                if (cmd.trim() !== '') {
                    // Добавляем команду в вывод (локально)
                    setOutput(lastOutput + '$ ' + cmd + '\n');
                    lastOutput += '$ ' + cmd + '\n';
                    sendCommand(cmd);
                    commandInput.value = '';
                }
            }
        });

        // Запускаем регулярный опрос
        fetchOutput();
        setInterval(() => fetchOutput(), pollInterval);

        // При потере соединения пробуем переподключиться
        window.addEventListener('offline', () => {
            console.log('offline');
        });
        window.addEventListener('online', () => {
            fetchOutput();
        });
    </script>
</body>
</html>
