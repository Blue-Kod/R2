<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 - Терминал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            color: #00ff00;
            font-family: 'Ubuntu Sans Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #111;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        header a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            margin: 0 15px;
        }
        header a:hover {
            text-decoration: underline;
        }
        #output {
            flex: 1;
            background: black;
            color: #00ff00;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Ubuntu Sans Mono', monospace;
        }
        .input-line {
            display: flex;
            background: #111;
            border-top: 1px solid #333;
            padding: 10px;
        }
        .prompt {
            color: #00ff00;
            font-size: 16px;
            margin-right: 8px;
            user-select: none;
        }
        #command {
            flex: 1;
            background: black;
            border: none;
            outline: none;
            color: #00ff00;
            font-family: 'Ubuntu Sans Mono', monospace;
            font-size: 16px;
            caret-color: #00ff00;
        }
        #command::placeholder {
            color: #006600;
        }
        .error {
            color: #ff5555;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">R2</a>
        <a href="/screen">Экран</a>
        <a href="/terminal">CMD</a>
        <a href="/logs">Логи</a>
    </header>
    <div id="output"></div>
    <div class="input-line">
        <span class="prompt">$</span>
        <input type="text" id="command" placeholder="Введите команду..." autofocus>
    </div>

    <script>
        const outputDiv = document.getElementById('output');
        const commandInput = document.getElementById('command');
        let lastOutput = '';
        let pollInterval = 100; // миллисекунд
        let fetchInProgress = false; // защита от одновременных запросов
        let sendInProgress = false;

        // Улучшенная функция удаления ANSI escape-последовательностей
        function stripAnsi(str) {
            if (!str) return '';
            // Удаляем CSI последовательности: \x1b\[[0-9;?]*[a-zA-Z]
            // Удаляем OSC (установка заголовка): \x1b\][0-9;]*[a-zA-Z]?.*?\x07
            // Удаляем одиночные \x07 (BEL)
            // Удаляем \x1b\\ (ST)
            return str
                .replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '')           // CSI с ? 
                .replace(/\x1b\][0-9;]*[a-zA-Z]?.*?\x07/g, '')    // OSC до BEL
                .replace(/\x1b\\/g, '')                            // ST
                .replace(/\x07/g, '');                             // BEL
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function appendOutput(text) {
            outputDiv.innerHTML += escapeHtml(stripAnsi(text));
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function setOutput(text) {
            outputDiv.innerHTML = escapeHtml(stripAnsi(text));
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        async function fetchOutput() {
            if (fetchInProgress) return;
            fetchInProgress = true;
            try {
                const response = await fetch('/api/cmd/output');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.output !== lastOutput) {
                    setOutput(data.output);
                    lastOutput = data.output;
                }
            } catch (err) {
                // Тихая ошибка — ничего не показываем пользователю
                console.debug('fetchOutput error:', err);
            } finally {
                fetchInProgress = false;
            }
        }

        async function sendCommand(cmd) {
            if (sendInProgress) return;
            sendInProgress = true;
            try {
                const response = await fetch('/api/cmd/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.error) {
                    // Можно показать, но скроем
                    console.debug('sendCommand error:', data.error);
                } else {
                    // После отправки сразу обновим вывод
                    await fetchOutput();
                }
            } catch (err) {
                console.debug('sendCommand fetch error:', err);
            } finally {
                sendInProgress = false;
            }
        }

        commandInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = commandInput.value;
                if (cmd.trim() !== '') {
                    appendOutput(cmd + '\r\n');
                    sendCommand(cmd);
                    commandInput.value = '';
                }
            }
        });

        // Запускаем опрос вывода
        fetchOutput();
        setInterval(fetchOutput, pollInterval);
    </script>
</body>
</html>
