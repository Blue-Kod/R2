<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: black;
            color: #888;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Контейнер глаз */
        .eyes-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background: black;
        }
        /* Глаз */
        .eye {
            width: 240px;
            height: 560px;
            background-color: #aaa;
            border-radius: 60px;
            transition: background-color 0.1s ease;
            animation: shake 1s infinite ease-in-out;
        }
        /* Анимация дрожания */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            50% { transform: translateX(2px); }
            75% { transform: translateX(-1px); }
            100% { transform: translateX(0); }
        }
        /* Состояние моргания (закрытый глаз) */
        .eye.blink {
            background-color: #222;
        }
        /* Нижняя панель */
        .bottom-panel {
            background: black;
            padding: 10px;
            border-top: 1px solid #333;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        button {
            background: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover {
            background: #555;
        }
        button:disabled {
            background: #222;
            color: #666;
            cursor: not-allowed;
        }
        /* Логи */
        .logs {
            background: #111;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-size: 9pt;
            border: none;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .metrics {
            color: #888;
            margin-bottom: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="eyes-container">
        <div class="eye" id="leftEye"></div>
        <div class="eye" id="rightEye"></div>
    </div>

    <div class="bottom-panel">
        <div class="buttons">
            <button id="minimizeBtn">Свернуть</button>
            <button id="updateBtn">Обновление</button>
        </div>
        <div class="metrics" id="metrics"></div>
        <div class="logs" id="logs"></div>
    </div>

    <script>
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const updateBtn = document.getElementById('updateBtn');
        const minimizeBtn = document.getElementById('minimizeBtn');
        const metricsDiv = document.getElementById('metrics');
        const logsDiv = document.getElementById('logs');

        // Моргание случайное
        function blink() {
            if (leftEye.classList.contains('blink')) return;
            leftEye.classList.add('blink');
            rightEye.classList.add('blink');
            setTimeout(() => {
                leftEye.classList.remove('blink');
                rightEye.classList.remove('blink');
            }, 150);
            scheduleBlink();
        }

        function scheduleBlink() {
            const delay = Math.random() * (15000 - 5000) + 5000; // 5-15 сек
            setTimeout(blink, delay);
        }
        scheduleBlink();

        // Обновление метрик и логов
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                metricsDiv.textContent = `CPU: ${data.cpu}%  RAM: ${data.ram}%  TEMP: ${data.temp}`;
                logsDiv.textContent = data.logs.join('\n');
                // Прокрутка вниз
                logsDiv.scrollTop = logsDiv.scrollHeight;
            } catch (e) {
                console.error('Ошибка получения данных:', e);
            }
        }
        fetchData();
        setInterval(fetchData, 2000);

        // Кнопка свернуть (не работает в полноэкранном браузере без API)
        minimizeBtn.addEventListener('click', () => {
            // В Chromium в kiosk-режиме нельзя свернуть окно программно.
            // Можно попробовать отправить Alt+F9 или что-то, но лучше просто игнорировать.
            alert('Используйте клавишу Esc для выхода из полноэкранного режима');
        });

        // Кнопка обновления
        updateBtn.addEventListener('click', async () => {
            updateBtn.disabled = true;
            updateBtn.textContent = 'Обновляется...';
            try {
                const response = await fetch('/api/update', { method: 'POST' });
                const result = await response.json();
                if (result.status === 'ok') {
                    // Через некоторое время вернём кнопку
                    setTimeout(() => {
                        updateBtn.disabled = false;
                        updateBtn.textContent = 'Обновление';
                    }, 10000);
                } else {
                    alert('Ошибка: ' + result.message);
                    updateBtn.disabled = false;
                    updateBtn.textContent = 'Обновление';
                }
            } catch (e) {
                alert('Ошибка сети');
                updateBtn.disabled = false;
                updateBtn.textContent = 'Обновление';
            }
        });

        // Выход по Esc (если окно не в kiosk, но в обычном режиме)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // Попытка выйти из полноэкранного режима (работает не во всех браузерах)
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
