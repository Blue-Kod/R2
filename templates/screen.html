<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 - Экран</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: black;
            color: #fff;
            font-family: 'Ubuntu Sans Mono', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            cursor: none !important;
        }
        .eyes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 150px;
            background: black;
            z-index: 10;
            transform: translateY(-150px);
        }
        .eye {
            width: 180px;
            height: 560px;
            background-color: #fff;
            border-radius: 120px;
            transition: transform 0.15s ease;
            transform-origin: center center;
            /* По умолчанию без сдвига, scaleY = 1 */
            transform: translate(var(--shake-x, 0px), var(--shake-y, 0px)) scaleY(1);
        }
        .eye.blink {
            /* При моргании добавляем scaleY(0.1) поверх сдвига */
            transform: translate(var(--shake-x, 0px), var(--shake-y, 0px)) scaleY(0.1);
        }
        .logs-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 40px;
        }
        .metrics {
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            text-shadow: 0 0 5px black;
            pointer-events: none;
        }
        .logs {
            color: #fff;
            font-size: 10px;
            line-height: 1.4;
            max-height: 60%;
            overflow-y: auto;
            width: 100%;
            pointer-events: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: #444 #111;
            text-shadow: 0 0 3px black;
        }
        .logs::-webkit-scrollbar {
            width: 8px;
        }
        .logs::-webkit-scrollbar-track {
            background: #111;
        }
        .logs::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        .logs div {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .menu-trigger {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 30;
            background: transparent;
            cursor: pointer;
        }
        .menu {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.95);
            border-radius: 12px;
            padding: 8px 0;
            display: none;
            flex-direction: column;
            min-width: 220px;
            z-index: 40;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            border: 1px solid #444;
        }
        .menu.visible {
            display: flex;
        }
        .menu-item {
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
            border-bottom: 1px solid #444;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item:hover {
            background: #555;
        }
        .menu-item.ip {
            background: #222;
            color: #00ff00;
            cursor: default;
            pointer-events: none;
        }
        .menu-item.ip:hover {
            background: #222;
        }

        /* Стили для панели Properties */
        .properties-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #555;
            border-radius: 16px;
            padding: 25px;
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 15px;
            min-width: 350px;
            color: white;
            font-family: 'Ubuntu Sans Mono', monospace;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        .properties-panel.visible {
            display: flex;
        }
        .properties-panel h3 {
            text-align: center;
            margin-bottom: 10px;
            color: #ffaa00;
        }
        .property-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .property-row label {
            flex: 1;
        }
        .property-row input[type="range"] {
            flex: 2;
            margin: 0 10px;
        }
        .property-row span {
            min-width: 40px;
            text-align: right;
        }
        .property-row.checkbox {
            justify-content: flex-start;
            gap: 10px;
        }
        .property-row.checkbox input {
            width: 20px;
            height: 20px;
        }
        .close-properties {
            background: #aa3333;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .close-properties:hover {
            background: #cc5555;
        }
        .note {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="eyes-container">
        <div class="eye" id="leftEye"></div>
        <div class="eye" id="rightEye"></div>
    </div>

    <div class="logs-overlay">
        <div class="metrics" id="metrics"></div>
        <div class="logs" id="logs"></div>
    </div>

    <div class="menu-trigger" id="menuTrigger"></div>

    <div class="menu" id="menu">
        <div class="menu-item ip" id="ipDisplay">IP: загрузка...</div>
        <div class="menu-item" id="propertiesBtn">Properties</div>
        <div class="menu-item" id="closeBtn">Закрыть</div>
        <div class="menu-item" id="homeBtn">На главную</div>
    </div>

    <!-- Панель Properties -->
    <div class="properties-panel" id="propertiesPanel">
        <h3>⚙️ Настройки камеры и трекинга</h3>
        <div class="property-row checkbox">
            <input type="checkbox" id="depthEnabled"> <label>Глубина (depth)</label>
        </div>
        <div class="property-row checkbox">
            <input type="checkbox" id="faceTrackingEnabled"> <label>Отслеживание лиц</label>
        </div>
        <div class="property-row">
            <label>Scale X (пикс)</label>
            <input type="range" id="trackingScaleX" min="0" max="200" value="50" step="1">
            <span id="scaleXVal">50</span>
        </div>
        <div class="property-row">
            <label>Scale Y (пикс)</label>
            <input type="range" id="trackingScaleY" min="0" max="200" value="30" step="1">
            <span id="scaleYVal">30</span>
        </div>
        <div class="property-row">
            <label>Offset X (пикс)</label>
            <input type="range" id="trackingOffsetX" min="-100" max="100" value="0" step="1">
            <span id="offsetXVal">0</span>
        </div>
        <div class="property-row">
            <label>Offset Y (пикс)</label>
            <input type="range" id="trackingOffsetY" min="-100" max="100" value="0" step="1">
            <span id="offsetYVal">0</span>
        </div>
        <div class="note">
            📷 Камера наклонена вниз на 30°. При необходимости подберите Offset Y.
        </div>
        <button class="close-properties" id="closeProperties">Закрыть</button>
    </div>

    <script>
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const menuTrigger = document.getElementById('menuTrigger');
        const menu = document.getElementById('menu');
        const closeBtn = document.getElementById('closeBtn');
        const homeBtn = document.getElementById('homeBtn');
        const propertiesBtn = document.getElementById('propertiesBtn');
        const propertiesPanel = document.getElementById('propertiesPanel');
        const closeProperties = document.getElementById('closeProperties');
        const ipDisplay = document.getElementById('ipDisplay');
        const metricsDiv = document.getElementById('metrics');
        const logsDiv = document.getElementById('logs');

        // Элементы управления properties
        const depthEnabledChk = document.getElementById('depthEnabled');
        const faceTrackingChk = document.getElementById('faceTrackingEnabled');
        const trackingScaleX = document.getElementById('trackingScaleX');
        const trackingScaleY = document.getElementById('trackingScaleY');
        const trackingOffsetX = document.getElementById('trackingOffsetX');
        const trackingOffsetY = document.getElementById('trackingOffsetY');
        const scaleXVal = document.getElementById('scaleXVal');
        const scaleYVal = document.getElementById('scaleYVal');
        const offsetXVal = document.getElementById('offsetXVal');
        const offsetYVal = document.getElementById('offsetYVal');

        // Моргание
        function blink() {
            if (leftEye.classList.contains('blink')) return;
            leftEye.classList.add('blink');
            rightEye.classList.add('blink');
            setTimeout(() => {
                leftEye.classList.remove('blink');
                rightEye.classList.remove('blink');
            }, 150);
            scheduleBlink();
        }
        function scheduleBlink() {
            const delay = Math.random() * (15000 - 5000) + 5000;
            setTimeout(blink, delay);
        }
        scheduleBlink();

        // Меню
        menuTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('visible');
        });

        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && e.target !== menuTrigger) {
                menu.classList.remove('visible');
            }
        });

        closeBtn.addEventListener('click', async () => {
            menu.classList.remove('visible');
            try {
                const response = await fetch('/api/shutdown', { method: 'POST' });
                const result = await response.json();
                if (result.status === 'ok') {
                    setTimeout(() => window.close(), 1000);
                } else {
                    alert('Ошибка: ' + result.message);
                }
            } catch (e) {
                alert('Ошибка сети');
            }
        });

        homeBtn.addEventListener('click', () => {
            window.location.href = '/';
        });

        // Properties: показать/скрыть
        propertiesBtn.addEventListener('click', () => {
            menu.classList.remove('visible');
            propertiesPanel.classList.add('visible');
            loadCameraParams();
        });

        closeProperties.addEventListener('click', () => {
            propertiesPanel.classList.remove('visible');
        });

        // Загрузка текущих параметров с сервера
        async function loadCameraParams() {
            try {
                const resp = await fetch('/api/camera/params');
                const params = await resp.json();
                depthEnabledChk.checked = params.depth_enabled;
                faceTrackingChk.checked = params.face_tracking_enabled;
                trackingScaleX.value = params.tracking_scale_x;
                trackingScaleY.value = params.tracking_scale_y;
                trackingOffsetX.value = params.tracking_offset_x;
                trackingOffsetY.value = params.tracking_offset_y;
                updateDisplayValues();
            } catch (e) {
                console.error('Не удалось загрузить параметры', e);
            }
        }

        function updateDisplayValues() {
            scaleXVal.textContent = trackingScaleX.value;
            scaleYVal.textContent = trackingScaleY.value;
            offsetXVal.textContent = trackingOffsetX.value;
            offsetYVal.textContent = trackingOffsetY.value;
        }

        // Отправка изменений на сервер
        async function sendCameraParams() {
            const params = {
                depth_enabled: depthEnabledChk.checked,
                face_tracking_enabled: faceTrackingChk.checked,
                tracking_scale_x: parseInt(trackingScaleX.value),
                tracking_scale_y: parseInt(trackingScaleY.value),
                tracking_offset_x: parseInt(trackingOffsetX.value),
                tracking_offset_y: parseInt(trackingOffsetY.value)
            };
            try {
                await fetch('/api/camera/params', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });
            } catch (e) {
                console.error('Ошибка отправки параметров', e);
            }
        }

        // Слушатели изменений
        depthEnabledChk.addEventListener('change', sendCameraParams);
        faceTrackingChk.addEventListener('change', sendCameraParams);
        trackingScaleX.addEventListener('input', () => {
            updateDisplayValues();
            sendCameraParams();
        });
        trackingScaleY.addEventListener('input', () => {
            updateDisplayValues();
            sendCameraParams();
        });
        trackingOffsetX.addEventListener('input', () => {
            updateDisplayValues();
            sendCameraParams();
        });
        trackingOffsetY.addEventListener('input', () => {
            updateDisplayValues();
            sendCameraParams();
        });

        // Получение IP
        async function fetchIP() {
            try {
                const response = await fetch('/api/ip');
                const data = await response.json();
                ipDisplay.textContent = `IP: ${data.ip}`;
            } catch (e) {
                ipDisplay.textContent = 'IP: не определен';
            }
        }
        fetchIP();

        // Обновление данных (CPU, RAM, логи)
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                metricsDiv.textContent = `CPU: ${data.cpu}%  RAM: ${data.ram}%  TEMP: ${data.temp}`;
                logsDiv.innerHTML = data.logs.map(line => `<div>${escapeHtml(line)}</div>`).join('');
                logsDiv.scrollTop = logsDiv.scrollHeight;
            } catch (e) {
                console.error('Ошибка получения данных:', e);
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }

        fetchData();
        setInterval(fetchData, 2000);

        // Обновление положения глаз по данным трекинга
        function updateEyeOffsets() {
            fetch('/api/tracking/offsets')
                .then(response => response.json())
                .then(data => {
                    const dx = data.dx.toFixed(1);
                    const dy = data.dy.toFixed(1);
                    leftEye.style.setProperty('--shake-x', dx + 'px');
                    leftEye.style.setProperty('--shake-y', dy + 'px');
                    rightEye.style.setProperty('--shake-x', dx + 'px');
                    rightEye.style.setProperty('--shake-y', dy + 'px');
                })
                .catch(err => console.error('Ошибка получения смещений:', err))
                .then(() => {
                    setTimeout(updateEyeOffsets, 33); // ~30 fps
                });
        }
        updateEyeOffsets();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
