<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: black;
            color: #ccc;
            font-family: 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }
        /* Контейнер глаз – выше логов */
        .eyes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 150px;
            background: black;
            z-index: 10;
        }
        /* Глаз – тонкий, белый */
        .eye {
            width: 180px;
            height: 560px;
            background-color: #fff;
            border-radius: 120px;
            transition: transform 0.1s ease; /* для моргания */
            transform-origin: center center;
        }
        /* Моргание – сжатие по высоте */
        .eye.blink {
            transform: scaleY(0.1);
        }
        /* Логи на фоне – без фона, текст прямо поверх глаз (ниже по z-index) */
        .logs-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 40px;
        }
        .metrics {
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            text-shadow: 0 0 5px black;
            pointer-events: none;
        }
        .logs {
            color: #fff;
            font-size: 10px;
            line-height: 1.4;
            max-height: 60%;
            overflow-y: auto;
            width: 100%;
            pointer-events: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: #444 #111;
            text-shadow: 0 0 3px black;
        }
        .logs::-webkit-scrollbar {
            width: 8px;
        }
        .logs::-webkit-scrollbar-track {
            background: #111;
        }
        .logs::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        .logs div {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        /* Кнопки */
        .buttons {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        button {
            background: rgba(30, 30, 30, 0.9);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: background 0.2s;
        }
        button:hover {
            background: rgba(80, 80, 80, 0.9);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="eyes-container">
        <div class="eye" id="leftEye"></div>
        <div class="eye" id="rightEye"></div>
    </div>

    <div class="logs-overlay">
        <div class="metrics" id="metrics"></div>
        <div class="logs" id="logs"></div>
    </div>

    <div class="buttons">
        <button id="minimizeBtn">Свернуть</button>
        <button id="updateBtn">Обновление</button>
    </div>

    <script>
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const updateBtn = document.getElementById('updateBtn');
        const minimizeBtn = document.getElementById('minimizeBtn');
        const metricsDiv = document.getElementById('metrics');
        const logsDiv = document.getElementById('logs');

        // --- Моргание (меняет высоту) ---
        function blink() {
            if (leftEye.classList.contains('blink')) return;
            leftEye.classList.add('blink');
            rightEye.classList.add('blink');
            setTimeout(() => {
                leftEye.classList.remove('blink');
                rightEye.classList.remove('blink');
            }, 150);
            scheduleBlink();
        }

        function scheduleBlink() {
            const delay = Math.random() * (15000 - 5000) + 5000; // 5-15 сек
            setTimeout(blink, delay);
        }
        scheduleBlink();

        // --- Постоянное слабое дрожание ---
        function randomShake() {
            // случайное смещение от -3 до 3 пикселей по X и Y
            const x = (Math.random() * 6 - 3).toFixed(1);
            const y = (Math.random() * 6 - 3).toFixed(1);
            const transform = `translate(${x}px, ${y}px)`;
            leftEye.style.transform = transform;
            rightEye.style.transform = transform;
        }
        // Запускаем интервал каждые 100 мс для непрерывной тряски
        setInterval(randomShake, 500);

        // --- Обновление данных ---
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                metricsDiv.textContent = `CPU: ${data.cpu}%  RAM: ${data.ram}%  TEMP: ${data.temp}`;
                logsDiv.innerHTML = data.logs.map(line => `<div>${escapeHtml(line)}</div>`).join('');
                logsDiv.scrollTop = logsDiv.scrollHeight;
            } catch (e) {
                console.error('Ошибка получения данных:', e);
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }

        fetchData();
        setInterval(fetchData, 2000);

        // --- Кнопки ---
        minimizeBtn.addEventListener('click', () => {
            alert('Используйте клавишу Esc для выхода из полноэкранного режима');
        });

        updateBtn.addEventListener('click', async () => {
            updateBtn.disabled = true;
            updateBtn.textContent = 'Обновляется...';
            try {
                const response = await fetch('/api/update', { method: 'POST' });
                const result = await response.json();
                if (result.status === 'ok') {
                    setTimeout(() => {
                        updateBtn.disabled = false;
                        updateBtn.textContent = 'Обновление';
                    }, 10000);
                } else {
                    alert('Ошибка: ' + result.message);
                    updateBtn.disabled = false;
                    updateBtn.textContent = 'Обновление';
                }
            } catch (e) {
                alert('Ошибка сети');
                updateBtn.disabled = false;
                updateBtn.textContent = 'Обновление';
            }
        });

        // Выход по Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
