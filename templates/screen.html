<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: black;
            color: #ccc;
            font-family: 'Courier New', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }
        /* Контейнер глаз */
        .eyes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 150px;
            background: black;
            z-index: 10;
            transform: translateY(-150px);
        }
        .eye {
            width: 180px;
            height: 560px;
            background-color: #fff;
            border-radius: 120px;
            transition: transform 0.1s ease;
            transform-origin: center center;
        }
        .eye.blink {
            transform: scaleY(0.1);
        }
        /* Логи на фоне */
        .logs-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 40px;
        }
        .metrics {
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            text-shadow: 0 0 5px black;
            pointer-events: none;
        }
        .logs {
            color: #fff;
            font-size: 10px;
            line-height: 1.4;
            max-height: 60%;
            overflow-y: auto;
            width: 100%;
            pointer-events: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: #444 #111;
            text-shadow: 0 0 3px black;
        }
        .logs::-webkit-scrollbar {
            width: 8px;
        }
        .logs::-webkit-scrollbar-track {
            background: #111;
        }
        .logs::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        .logs div {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        /* Область для вызова меню (невидимая полоса внизу) */
        .menu-trigger {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 30;
            background: transparent;
            cursor: pointer;
        }
        /* Само меню */
        .menu {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.95);
            border-radius: 12px;
            padding: 8px 0;
            display: none;
            flex-direction: column;
            min-width: 180px;
            z-index: 40;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            border: 1px solid #444;
        }
        .menu.visible {
            display: flex;
        }
        .menu-item {
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
            border-bottom: 1px solid #444;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="eyes-container">
        <div class="eye" id="leftEye"></div>
        <div class="eye" id="rightEye"></div>
    </div>

    <div class="logs-overlay">
        <div class="metrics" id="metrics"></div>
        <div class="logs" id="logs"></div>
    </div>

    <!-- Область для вызова меню -->
    <div class="menu-trigger" id="menuTrigger"></div>

    <!-- Меню -->
    <div class="menu" id="menu">
        <div class="menu-item" id="closeBtn">Закрыть</div>
        <div class="menu-item" id="updateBtn">Обновить</div>
    </div>

    <script>
        const leftEye = document.getElementById('leftEye');
        const rightEye = document.getElementById('rightEye');
        const menuTrigger = document.getElementById('menuTrigger');
        const menu = document.getElementById('menu');
        const closeBtn = document.getElementById('closeBtn');
        const updateBtn = document.getElementById('updateBtn');
        const metricsDiv = document.getElementById('metrics');
        const logsDiv = document.getElementById('logs');

        // --- Моргание ---
        function blink() {
            if (leftEye.classList.contains('blink')) return;
            leftEye.classList.add('blink');
            rightEye.classList.add('blink');
            setTimeout(() => {
                leftEye.classList.remove('blink');
                rightEye.classList.remove('blink');
            }, 150);
            scheduleBlink();
        }

        function scheduleBlink() {
            const delay = Math.random() * (15000 - 5000) + 5000;
            setTimeout(blink, delay);
        }
        scheduleBlink();

        // --- Дрожание ---
        function randomShake() {
            const x = (Math.random() * 6 - 3).toFixed(1);
            const y = (Math.random() * 6 - 3).toFixed(1);
            const transform = `translate(${x}px, ${y}px)`;
            leftEye.style.transform = transform;
            rightEye.style.transform = transform;
        }
        setInterval(randomShake, 500);

        // --- Показ/скрытие меню ---
        menuTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('visible');
        });

        // Клик вне меню скрывает его
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && e.target !== menuTrigger) {
                menu.classList.remove('visible');
            }
        });

        closeBtn.addEventListener('click', async () => {
            menu.classList.remove('visible');
            try {
                const response = await fetch('/api/shutdown', { method: 'POST' });
                const result = await response.json();
                if (result.status === 'ok') {
                    // Пытаемся закрыть окно браузера
                    setTimeout(() => {
                        window.close();
                    }, 1000);
                } else {
                    alert('Ошибка: ' + result.message);
                }
            } catch (e) {
                alert('Ошибка сети');
            }
        });

        updateBtn.addEventListener('click', async () => {
            menu.classList.remove('visible');
            updateBtn.style.pointerEvents = 'none'; // защита от повторного клика
            try {
                const response = await fetch('/api/update', { method: 'POST' });
                const result = await response.json();
                if (result.status === 'ok') {
                    // Через некоторое время перезагрузим страницу, чтобы подключиться к новому серверу
                    setTimeout(() => {
                        location.reload();
                    }, 5000);
                } else {
                    alert('Ошибка: ' + result.message);
                    updateBtn.style.pointerEvents = 'auto';
                }
            } catch (e) {
                alert('Ошибка сети');
                updateBtn.style.pointerEvents = 'auto';
            }
        });

        // --- Обновление данных ---
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                metricsDiv.textContent = `CPU: ${data.cpu}%  RAM: ${data.ram}%  TEMP: ${data.temp}`;
                logsDiv.innerHTML = data.logs.map(line => `<div>${escapeHtml(line)}</div>`).join('');
                logsDiv.scrollTop = logsDiv.scrollHeight;
            } catch (e) {
                console.error('Ошибка получения данных:', e);
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }

        fetchData();
        setInterval(fetchData, 2000);

        // Выход по Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
