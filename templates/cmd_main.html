<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 - Python консоль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: black;
            color: white;
            font-family: 'Ubuntu Sans Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #111;
            border-bottom: 1px solid #333;
        }
        .header button {
            background: #333;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Ubuntu Sans Mono', monospace;
            margin-right: 10px;
        }
        .header button:hover {
            background: #555;
        }
        .header span {
            font-size: 18px;
        }
        #output {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: black;
            color: white;
        }
        .input-area {
            display: flex;
            flex-direction: column;
            border-top: 1px solid #333;
            background: #111;
            padding: 8px;
        }
        #code {
            width: 100%;
            background: black;
            color: white;
            border: 1px solid #333;
            padding: 10px;
            font-family: 'Ubuntu Sans Mono', monospace;
            font-size: 14px;
            outline: none;
            border-radius: 4px;
            resize: vertical;
            min-height: 80px;
            margin-bottom: 8px;
        }
        #code:focus {
            border-color: #555;
        }
        .button-row {
            display: flex;
            justify-content: flex-end;
        }
        #send {
            background: #333;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Ubuntu Sans Mono', monospace;
            font-size: 14px;
        }
        #send:hover {
            background: #555;
        }
        #send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="window.location.href='/'">Главная</button>
        <span>Python консоль</span>
    </div>
    <div id="output"></div>
    <div class="input-area">
        <textarea id="code" placeholder="Введите Python код..."></textarea>
        <div class="button-row">
            <button id="send">Выполнить</button>
        </div>
    </div>

    <script>
        const outputDiv = document.getElementById('output');
        const codeInput = document.getElementById('code');
        const sendBtn = document.getElementById('send');

        function appendOutput(text, isError = false) {
            const line = document.createElement('div');
            line.textContent = text;
            if (isError) line.style.color = '#ff6b6b';
            outputDiv.appendChild(line);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        async function executeCode() {
            const code = codeInput.value.trim();
            if (!code) return;

            appendOutput(`>>> ${code.split('\n').join('\n... ')}`);
            codeInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/run_python', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const data = await response.json();
                if (data.output) {
                    appendOutput(data.output);
                } else {
                    appendOutput('(пустой вывод)');
                }
            } catch (e) {
                appendOutput(`Ошибка: ${e.message}`, true);
            } finally {
                sendBtn.disabled = false;
                codeInput.focus();
            }
        }

        sendBtn.addEventListener('click', executeCode);
        // Ctrl+Enter тоже выполняет код
        codeInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                executeCode();
            }
        });
    </script>
</body>
</html>
