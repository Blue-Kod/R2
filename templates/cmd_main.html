<!-- cmd_main.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 - Python консоль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: black;
            color: #fff;
            font-family: 'Ubuntu Sans Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: #111;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        header a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            margin: 0 15px;
        }
        header a:hover {
            text-decoration: underline;
        }
        .output-area {
            flex: 1;
            background: #000;
            padding: 15px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .input-area {
            background: #111;
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-area textarea {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            font-family: 'Ubuntu Sans Mono', monospace;
            font-size: 16px;
            padding: 10px;
            border-radius: 6px;
            outline: none;
            resize: vertical;
            min-height: 60px;
            max-height: 200px;
        }
        .input-area textarea:focus {
            border-color: #666;
        }
        .input-area button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
            min-width: 100px;
            height: fit-content;
        }
        .input-area button:hover:not(:disabled) {
            background: #555;
        }
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error {
            color: #ff8888;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">R2</a>
        <a href="/screen">Экран</a>
        <a href="/cmd/os">CMD</a>
        <a href="/cmd/main">Python</a>
    </header>

    <div class="output-area" id="output"></div>

    <div class="input-area">
        <textarea id="codeInput" placeholder="Введите Python код..." autofocus></textarea>
        <button id="execBtn">Выполнить</button>
    </div>

    <script>
        const outputDiv = document.getElementById('output');
        const codeInput = document.getElementById('codeInput');
        const execBtn = document.getElementById('execBtn');

        let isExecuting = false;

        async function executeCode() {
            const code = codeInput.value.trim();
            if (!code || isExecuting) return;

            isExecuting = true;
            execBtn.disabled = true;
            execBtn.textContent = 'Выполняется...';

            outputDiv.innerHTML += `<div style="color:#888;">>>> ${escapeHtml(code)}</div>`;
            codeInput.value = '';

            let attempts = 0;
            const maxAttempts = 3;

            const tryFetch = async () => {
                try {
                    const response = await fetch('/api/cmd/main', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cmd: code })
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (data.error) {
                        outputDiv.innerHTML += `<div class="error">Ошибка: ${escapeHtml(data.error)}</div>`;
                    } else {
                        outputDiv.innerHTML += `<div>${escapeHtml(data.output)}</div>`;
                    }
                    outputDiv.scrollTop = outputDiv.scrollHeight;
                    return true;
                } catch (err) {
                    if (attempts < maxAttempts - 1) {
                        attempts++;
                        outputDiv.innerHTML += `<div class="error">Попытка ${attempts} не удалась, повтор...</div>`;
                        await new Promise(r => setTimeout(r, 1000));
                        return tryFetch();
                    } else {
                        outputDiv.innerHTML += `<div class="error">Ошибка: ${escapeHtml(err.message)}</div>`;
                        return false;
                    }
                }
            };

            await tryFetch();

            isExecuting = false;
            execBtn.disabled = false;
            execBtn.textContent = 'Выполнить';
            codeInput.focus();
        }

        execBtn.addEventListener('click', executeCode);
        codeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                executeCode();
            }
        });

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        codeInput.focus();
    </script>
</body>
</html>
