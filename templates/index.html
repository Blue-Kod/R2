<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 - Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: black;
            color: #fff;
            font-family: 'Ubuntu Sans Mono', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }
        .video-container {
            flex: 2;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #videoFeed {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .tab-bar {
            display: flex;
            background: #222;
            border-bottom: 2px solid #444;
        }
        .tab {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            cursor: pointer;
            background: #222;
            color: #aaa;
            border-right: 1px solid #444;
            transition: 0.2s;
        }
        .tab:last-child {
            border-right: none;
        }
        .tab.active {
            background: #333;
            color: #fff;
            font-weight: bold;
        }
        .panel {
            flex: 1;
            background: #1a1a1a;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }
        .panel.active {
            display: block;
        }
        .logs-panel .logs {
            color: #fff;
            font-size: 12px;
            line-height: 1.4;
            max-height: 100%;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #444 #111;
        }
        .logs-panel .logs div {
            white-space: pre-wrap;
            word-wrap: break-word;
            border-bottom: 1px solid #333;
            padding: 4px 0;
        }
        .metrics {
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Панель свойств */
        .properties-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: white;
        }
        .property-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .property-row label {
            flex: 1;
        }
        .property-row input[type="range"] {
            flex: 2;
            margin: 0 10px;
        }
        .property-row span {
            min-width: 40px;
            text-align: right;
        }
        .property-row.checkbox {
            justify-content: flex-start;
            gap: 10px;
        }
        .property-row.checkbox input {
            width: 20px;
            height: 20px;
        }
        .note {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }
        .menu-trigger {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 30;
            background: transparent;
            cursor: pointer;
        }
        .menu {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.95);
            border-radius: 12px;
            padding: 8px 0;
            display: none;
            flex-direction: column;
            min-width: 220px;
            z-index: 40;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            border: 1px solid #444;
        }
        .menu.visible {
            display: flex;
        }
        .menu-item {
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
            border-bottom: 1px solid #444;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item:hover {
            background: #555;
        }
        .menu-item.ip {
            background: #222;
            color: #00ff00;
            cursor: default;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-container">
            <img id="videoFeed" src="/video_feed" alt="Video Feed">
            <div class="menu-trigger" id="menuTrigger"></div>
            <div class="menu" id="menu">
                <div class="menu-item ip" id="ipDisplay">IP: загрузка...</div>
                <div class="menu-item" id="screenBtn">На экран</div>
                <div class="menu-item" id="closeBtn">Закрыть</div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab active" id="tabLogs">📋 Логи</div>
            <div class="tab" id="tabProperties">⚙️ Свойства</div>
        </div>

        <div class="panel logs-panel active" id="panelLogs">
            <div class="metrics" id="metrics"></div>
            <div class="logs" id="logs"></div>
        </div>

        <div class="panel properties-panel" id="panelProperties">
            <h3>⚙️ Настройки камеры и трекинга</h3>
            <div class="property-row checkbox">
                <input type="checkbox" id="depthEnabled"> <label>Глубина (depth)</label>
            </div>
            <div class="property-row checkbox">
                <input type="checkbox" id="faceTrackingEnabled"> <label>Отслеживание лиц</label>
            </div>
            <div class="property-row">
                <label>Scale X (пикс)</label>
                <input type="range" id="trackingScaleX" min="0" max="200" value="50" step="1">
                <span id="scaleXVal">50</span>
            </div>
            <div class="property-row">
                <label>Scale Y (пикс)</label>
                <input type="range" id="trackingScaleY" min="0" max="200" value="30" step="1">
                <span id="scaleYVal">30</span>
            </div>
            <div class="property-row">
                <label>Offset X (пикс)</label>
                <input type="range" id="trackingOffsetX" min="-100" max="100" value="0" step="1">
                <span id="offsetXVal">0</span>
            </div>
            <div class="property-row">
                <label>Offset Y (пикс)</label>
                <input type="range" id="trackingOffsetY" min="-100" max="100" value="0" step="1">
                <span id="offsetYVal">0</span>
            </div>
            <div class="note">
                📷 Камера наклонена вниз на 30°. При необходимости подберите Offset Y.
            </div>
        </div>
    </div>

    <script>
        // Элементы
        const videoFeed = document.getElementById('videoFeed');
        const menuTrigger = document.getElementById('menuTrigger');
        const menu = document.getElementById('menu');
        const ipDisplay = document.getElementById('ipDisplay');
        const screenBtn = document.getElementById('screenBtn');
        const closeBtn = document.getElementById('closeBtn');
        const metricsDiv = document.getElementById('metrics');
        const logsDiv = document.getElementById('logs');

        const tabLogs = document.getElementById('tabLogs');
        const tabProperties = document.getElementById('tabProperties');
        const panelLogs = document.getElementById('panelLogs');
        const panelProperties = document.getElementById('panelProperties');

        // Элементы управления properties
        const depthEnabledChk = document.getElementById('depthEnabled');
        const faceTrackingChk = document.getElementById('faceTrackingEnabled');
        const trackingScaleX = document.getElementById('trackingScaleX');
        const trackingScaleY = document.getElementById('trackingScaleY');
        const trackingOffsetX = document.getElementById('trackingOffsetX');
        const trackingOffsetY = document.getElementById('trackingOffsetY');
        const scaleXVal = document.getElementById('scaleXVal');
        const scaleYVal = document.getElementById('scaleYVal');
        const offsetXVal = document.getElementById('offsetXVal');
        const offsetYVal = document.getElementById('offsetYVal');

        // Меню
        menuTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('visible');
        });

        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && e.target !== menuTrigger) {
                menu.classList.remove('visible');
            }
        });

        screenBtn.addEventListener('click', () => {
            window.location.href = '/screen';
        });

        closeBtn.addEventListener('click', async () => {
            menu.classList.remove('visible');
            try {
                const response = await fetch('/api/shutdown', { method: 'POST' });
                const result = await response.json();
                if (result.status === 'ok') {
                    setTimeout(() => window.close(), 1000);
                } else {
                    alert('Ошибка: ' + result.message);
                }
            } catch (e) {
                alert('Ошибка сети');
            }
        });

        // Tabs
        tabLogs.addEventListener('click', () => {
            tabLogs.classList.add('active');
            tabProperties.classList.remove('active');
            panelLogs.classList.add('active');
            panelProperties.classList.remove('active');
        });

        tabProperties.addEventListener('click', () => {
            tabProperties.classList.add('active');
            tabLogs.classList.remove('active');
            panelProperties.classList.add('active');
            panelLogs.classList.remove('active');
            loadCameraParams();  // загрузить параметры при открытии вкладки
        });

        // Загрузка параметров
        async function loadCameraParams() {
            try {
                const resp = await fetch('/api/camera/params');
                const params = await resp.json();
                depthEnabledChk.checked = params.depth_enabled;
                faceTrackingChk.checked = params.face_tracking_enabled;
                trackingScaleX.value = params.tracking_scale_x;
                trackingScaleY.value = params.tracking_scale_y;
                trackingOffsetX.value = params.tracking_offset_x;
                trackingOffsetY.value = params.tracking_offset_y;
                updateDisplayValues();
            } catch (e) {
                console.error('Не удалось загрузить параметры', e);
            }
        }

        function updateDisplayValues() {
            scaleXVal.textContent = trackingScaleX.value;
            scaleYVal.textContent = trackingScaleY.value;
            offsetXVal.textContent = trackingOffsetX.value;
            offsetYVal.textContent = trackingOffsetY.value;
        }

        async function sendCameraParams() {
            const params = {
                depth_enabled: depthEnabledChk.checked,
                face_tracking_enabled: faceTrackingChk.checked,
                tracking_scale_x: parseInt(trackingScaleX.value),
                tracking_scale_y: parseInt(trackingScaleY.value),
                tracking_offset_x: parseInt(trackingOffsetX.value),
                tracking_offset_y: parseInt(trackingOffsetY.value)
            };
            try {
                await fetch('/api/camera/params', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });
            } catch (e) {
                console.error('Ошибка отправки параметров', e);
            }
        }

        depthEnabledChk.addEventListener('change', sendCameraParams);
        faceTrackingChk.addEventListener('change', sendCameraParams);
        trackingScaleX.addEventListener('input', () => {
            updateDisplayValues();
            sendCameraParams();
        });
        trackingScaleY.addEventListener('input', () => {
            updateDisplayValues();
            sendCameraParams();
        });
        trackingOffsetX.addEventListener('input', () => {
            updateDisplayValues();
            sendCameraParams();
        });
        trackingOffsetY.addEventListener('input', () => {
            updateDisplayValues();
            sendCameraParams();
        });

        // IP
        async function fetchIP() {
            try {
                const response = await fetch('/api/ip');
                const data = await response.json();
                ipDisplay.textContent = `IP: ${data.ip}`;
            } catch (e) {
                ipDisplay.textContent = 'IP: не определен';
            }
        }
        fetchIP();

        // Данные и логи
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                metricsDiv.textContent = `CPU: ${data.cpu}%  RAM: ${data.ram}%  TEMP: ${data.temp}`;
                logsDiv.innerHTML = data.logs.map(line => `<div>${escapeHtml(line)}</div>`).join('');
                logsDiv.scrollTop = logsDiv.scrollHeight;
            } catch (e) {
                console.error('Ошибка получения данных:', e);
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }

        fetchData();
        setInterval(fetchData, 2000);
    </script>
</body>
</html>
