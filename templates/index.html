<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 - Главная</title>
    <style>
        /* (стили без изменений) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            color: #00ff00;
            font-family: 'Ubuntu Sans Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            cursor: none;
        }
        header {
            background: #111;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        header a {
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            margin: 0 15px;
        }
        header a:hover {
            text-decoration: underline;
        }
        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .panel {
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow: hidden;
        }
        .panel-left {
            width: 25%;
            background: #0a0a0a;
            border-right: 1px solid #333;
        }
        .panel-center {
            width: 50%;
            background: black;
            display: flex;
            flex-direction: column;
        }
        .panel-right {
            width: 25%;
            background: #0a0a0a;
            border-left: 1px solid #333;
            overflow-y: auto;
        }
        .panel-title {
            color: #00ff00;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        #logs {
            flex: 1;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-right: 5px;
        }
        #logs div {
            color: #aaa;
        }
        #video-container {
            flex: 1;
            background: black;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #video-feed {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border: 1px solid #333;
        }
        #controls {
            padding: 10px;
            background: #111;
            border-top: 1px solid #333;
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .control-row label {
            color: #00ff00;
            font-size: 12px;
        }
        .control-row input[type="checkbox"] {
            accent-color: #00ff00;
        }
        .control-row input[type="range"] {
            width: 60%;
            accent-color: #00ff00;
        }
        #terminal-output {
            flex: 1;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #000;
            padding: 5px;
            border: 1px solid #333;
            margin-bottom: 5px;
            min-height: 200px;
        }
        #terminal-input-line {
            display: flex;
        }
        #terminal-prompt {
            color: #00ff00;
            margin-right: 5px;
        }
        #terminal-command {
            flex: 1;
            background: black;
            border: none;
            outline: none;
            color: #00ff00;
            font-family: 'Ubuntu Sans Mono', monospace;
            font-size: 12px;
        }
        .depth-tooltip {
            position: absolute;
            background: rgba(0,0,0,0.85);
            color: #00ff00;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Ubuntu Sans Mono', monospace;
            pointer-events: none;
            border: 1px solid #00ff00;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,255,0,0.2);
        }
        .hidden {
            display: none;
        }
        .servo-controls {
            margin-top: 10px;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 4px;
        }
        .servo-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .servo-row label {
            width: 100px;
            font-size: 12px;
            color: #00ff00;
        }
        .servo-row input[type="range"] {
            flex: 1;
            min-width: 150px;
            accent-color: #00ff00;
        }
        .servo-row span {
            width: 45px;
            text-align: center;
            font-size: 12px;
        }
        .servo-row button {
            background: #333;
            color: white;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .servo-row button:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">R2</a>
        <a href="/screen">Экран</a>
        <a href="/terminal">CMD</a>
        <a href="/logs">Логи</a>
    </header>
    <div class="container">
        <!-- Левая панель: логи -->
        <div class="panel panel-left">
            <div class="panel-title">Системные логи</div>
            <div id="logs"></div>
        </div>

        <!-- Центральная панель: видео и управление камерой -->
        <div class="panel panel-center">
            <div id="video-container">
                <img id="video-feed" src="/video_feed" alt="Video Stream">
                <div id="depth-tooltip" class="depth-tooltip hidden"></div>
            </div>
            <div id="controls">
                <div class="control-row">
                    <label>Основной глаз:</label>
                    <div>
                        <input type="radio" name="mainEye" id="eyeLeft" checked onchange="updateParams()"> <label for="eyeLeft">Левый</label>
                        <input type="radio" name="mainEye" id="eyeRight" onchange="updateParams()"> <label for="eyeRight">Правый</label>
                    </div>
                </div>
                <div class="control-row">
                    <label>Показывать глубину:</label>
                    <input type="checkbox" id="showDepth" checked onchange="updateParams()">
                </div>
                <div class="control-row">
                    <label>Прозрачность глубины:</label>
                    <input type="range" id="depthAlpha" min="0" max="100" value="30" oninput="updateParams()">
                </div>
            </div>
        </div>

        <!-- Правая панель: терминал и сервоприводы -->
        <div class="panel panel-right">
            <div class="panel-title">Терминал</div>
            <div id="terminal-output"></div>
            <div id="terminal-input-line">
                <span id="terminal-prompt">$</span>
                <input type="text" id="terminal-command" placeholder="Введите команду..." autofocus>
            </div>

            <div class="panel-title" style="margin-top: 20px;">Сервоприводы</div>
            <div class="servo-controls">
                <!-- Канал 0: 0-180° -->
                <div class="servo-row">
                    <label>Серво 1 (канал 0):</label>
                    <input type="range" id="servo0" min="0" max="180" value="90" oninput="updateServoValue(0, this.value)" onchange="setServo(0, this.value)">
                    <span id="servo0_val">90°</span>
                    <button onclick="setServo(0, 0)">0°</button>
                    <button onclick="setServo(0, 90)">90°</button>
                    <button onclick="setServo(0, 180)">180°</button>
                </div>
                <!-- Канал 1: 0-270° -->
                <div class="servo-row">
                    <label>Серво 2 (канал 1):</label>
                    <input type="range" id="servo1" min="0" max="270" value="135" oninput="updateServoValue(1, this.value)" onchange="setServo(1, this.value)">
                    <span id="servo1_val">135°</span>
                    <button onclick="setServo(1, 0)">0°</button>
                    <button onclick="setServo(1, 135)">135°</button>
                    <button onclick="setServo(1, 270)">270°</button>
                </div>
                <!-- Канал 2: 0-270° -->
                <div class="servo-row">
                    <label>Серво 3 (канал 2):</label>
                    <input type="range" id="servo2" min="0" max="270" value="135" oninput="updateServoValue(2, this.value)" onchange="setServo(2, this.value)">
                    <span id="servo2_val">135°</span>
                    <button onclick="setServo(2, 0)">0°</button>
                    <button onclick="setServo(2, 135)">135°</button>
                    <button onclick="setServo(2, 270)">270°</button>
                </div>
                <!-- Канал 3: 0-180° -->
                <div class="servo-row">
                    <label>Серво 4 (канал 3):</label>
                    <input type="range" id="servo3" min="0" max="180" value="90" oninput="updateServoValue(3, this.value)" onchange="setServo(3, this.value)">
                    <span id="servo3_val">90°</span>
                    <button onclick="setServo(3, 0)">0°</button>
                    <button onclick="setServo(3, 90)">90°</button>
                    <button onclick="setServo(3, 180)">180°</button>
                </div>

                <div class="servo-row">
                    <button onclick="testServos()">Тестовый цикл (все 4)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- Логи (без изменений) ----------
        const logsDiv = document.getElementById('logs');
        async function fetchLogs() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                logsDiv.innerHTML = data.logs.map(line => `<div>${escapeHtml(line)}</div>`).join('');
                logsDiv.scrollTop = logsDiv.scrollHeight;
            } catch (e) {
                console.error('Ошибка получения логов:', e);
            }
        }
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                if(m === '"') return '&quot;';
                return m;
            });
        }
        fetchLogs();
        setInterval(fetchLogs, 2000);

        // ---------- Управление камерой (без изменений) ----------
        const eyeLeft = document.getElementById('eyeLeft');
        const eyeRight = document.getElementById('eyeRight');
        const showDepth = document.getElementById('showDepth');
        const depthAlpha = document.getElementById('depthAlpha');

        function updateParams() {
            const params = {
                alpha_depth: showDepth.checked ? parseInt(depthAlpha.value) : 0,
                show_left: eyeLeft.checked,
                num_disp: 7
            };
            fetch('/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            }).catch(err => console.error(err));
        }

        // ---------- Глубина при наведении (без изменений) ----------
        const video = document.getElementById('video-feed');
        const tooltip = document.getElementById('depth-tooltip');

        video.addEventListener('mousemove', (e) => {
            if (!showDepth.checked) {
                tooltip.classList.add('hidden');
                return;
            }
            const rect = video.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const scaleX = video.naturalWidth / rect.width;
            const scaleY = video.naturalHeight / rect.height;
            const imgX = Math.round(x * scaleX);
            const imgY = Math.round(y * scaleY);

            fetch('/api/depth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ x: imgX, y: imgY })
            })
            .then(res => res.json())
            .then(data => {
                if (data.depth !== null && data.depth !== undefined) {
                    tooltip.classList.remove('hidden');
                    tooltip.style.left = (e.clientX + 15) + 'px';
                    tooltip.style.top = (e.clientY + 15) + 'px';
                    tooltip.textContent = `${data.depth.toFixed(1)} см`;
                } else {
                    tooltip.classList.add('hidden');
                }
            })
            .catch(err => {
                console.error('Ошибка получения глубины:', err);
                tooltip.classList.add('hidden');
            });
        });

        video.addEventListener('mouseleave', () => {
            tooltip.classList.add('hidden');
        });

        // ---------- Терминал (без изменений) ----------
        const terminalOutput = document.getElementById('terminal-output');
        const terminalCommand = document.getElementById('terminal-command');
        let lastOutput = '';
        let fetchInProgress = false;
        let sendInProgress = false;

        function stripAnsi(str) {
            if (!str) return '';
            return str
                .replace(/\x1b\[[0-9;?]*[a-zA-Z]/g, '')
                .replace(/\x1b\][0-9;]*[a-zA-Z]?.*?\x07/g, '')
                .replace(/\x1b\\/g, '')
                .replace(/\x07/g, '')
                .replace(/\r\n/g, '\n')
                .replace(/\r/g, '\n');
        }

        function setTerminalOutput(text) {
            terminalOutput.innerHTML = stripAnsi(text);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        async function fetchTerminalOutput() {
            if (fetchInProgress) return;
            fetchInProgress = true;
            try {
                const response = await fetch('/api/cmd/output');
                const data = await response.json();
                if (data.output !== lastOutput) {
                    setTerminalOutput(data.output);
                    lastOutput = data.output;
                }
            } catch (err) {
                console.debug('fetchTerminalOutput error:', err);
            } finally {
                fetchInProgress = false;
            }
        }

        async function sendTerminalCommand(cmd) {
            if (sendInProgress) return;
            sendInProgress = true;
            try {
                await fetch('/api/cmd/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                await fetchTerminalOutput();
            } catch (err) {
                console.debug('sendTerminalCommand error:', err);
            } finally {
                sendInProgress = false;
            }
        }

        terminalCommand.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = terminalCommand.value;
                if (cmd.trim() !== '') {
                    setTerminalOutput(lastOutput + '$ ' + cmd + '\n');
                    lastOutput += '$ ' + cmd + '\n';
                    sendTerminalCommand(cmd);
                    terminalCommand.value = '';
                }
            }
        });

        fetchTerminalOutput();
        setInterval(fetchTerminalOutput, 200);

        // ---------- Управление сервоприводами (обновлено для 4 каналов) ----------
        function updateServoValue(channel, value) {
            document.getElementById(`servo${channel}_val`).innerText = value + '°';
        }

        function setServo(channel, angle) {
            fetch(`/api/servo/${channel}/${angle}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        console.error('Ошибка серво:', data.error);
                    } else {
                        console.log(`Серво ${channel} установлен в ${angle}°`);
                    }
                })
                .catch(err => console.error(err));
        }

        function testServos() {
            fetch('/api/servo/test', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        console.error('Ошибка теста:', data.error);
                    } else {
                        console.log('Тест всех сервоприводов запущен');
                    }
                })
                .catch(err => console.error(err));
        }
    </script>
</body>
</html>
